# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/data/managed/handler/templates/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  multiple-account-api-cloudformation:
    type: cloud-formation
    app: multiple-account-api
    parameters:
      templateStagePaths:
        CODE: multiple-account-api-CODE.template.json
        PROD: multiple-account-api-PROD.template.json
  multiple-account-api:
    type: aws-lambda
    parameters:
      fileName: multiple-account-api.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - multiple-account-api-
    dependencies:
      - multiple-account-api-cloudformation
