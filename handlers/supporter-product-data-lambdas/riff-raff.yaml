# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/data/templates/handler/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  supporter-product-data-lambdas-cloudformation:
    type: cloud-formation
    app: supporter-product-data-lambdas
    parameters:
      templateStagePaths:
        CODE: supporter-product-data-lambdas-CODE.template.json
        PROD: supporter-product-data-lambdas-PROD.template.json
  supporter-product-data-lambdas:
    type: aws-lambda
    parameters:
      fileName: supporter-product-data-lambdas.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - supporterProductData-QueryZuora-
        - supporterProductData-FetchResults-
        - supporterProductData-AddToQueue-
        - supporterProductData-ProcessItem-
    dependencies:
      - supporter-product-data-lambdas-cloudformation
