# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/data/templates/handler/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  new-subscription-api-cloudformation:
    type: cloud-formation
    app: new-subscription-api
    parameters:
      templateStagePaths:
        CODE: new-subscription-api-CODE.template.json
        PROD: new-subscription-api-PROD.template.json
  new-subscription-api:
    type: aws-lambda
    parameters:
      fileName: new-subscription-api.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - new-subscription-api-
    dependencies:
      - new-subscription-api-cloudformation
