stacks:
- membership
regions:
- eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  sf-move-subscriptions-api-cloudformation:
    type: cloud-formation
    app: sf-move-subscriptions-api
    parameters:
      templateStagePaths:
        CODE: sf-move-subscriptions-api-CODE.template.json
        PROD: sf-move-subscriptions-api-PROD.template.json

  sf-move-subscriptions-api:
    type: aws-lambda
    parameters:
      fileName: sf-move-subscriptions-api.jar
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
      - sf-move-subscriptions-api-
    dependencies: [sf-move-subscriptions-api-cloudformation]
