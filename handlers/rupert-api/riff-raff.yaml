# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/data/templates/handler/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  rupert-api-cloudformation:
    type: cloud-formation
    app: rupert-api
    parameters:
      templateStagePaths:
        CODE: rupert-api-CODE.template.json
        PROD: rupert-api-PROD.template.json
  rupert-api:
    type: aws-lambda
    parameters:
      fileName: rupert-api.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - rupert-api-
    dependencies:
      - rupert-api-cloudformation
