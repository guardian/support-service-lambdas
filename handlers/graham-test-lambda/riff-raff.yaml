# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/data/templates/handler/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  graham-test-lambda-cloudformation:
    type: cloud-formation
    app: graham-test-lambda
    parameters:
      templateStagePaths:
        CODE: graham-test-lambda-CODE.template.json
        PROD: graham-test-lambda-PROD.template.json
  graham-test-lambda:
    type: aws-lambda
    parameters:
      fileName: graham-test-lambda.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - graham-test-lambda-
    dependencies:
      - graham-test-lambda-cloudformation
