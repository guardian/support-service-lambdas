# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/buildcheck/data/managed/handlers/templates/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  observer-benefits-api-cloudformation:
    type: cloud-formation
    app: observer-benefits-api
    parameters:
      templateStagePaths:
        CODE: observer-benefits-api-CODE.template.json
        PROD: observer-benefits-api-PROD.template.json
  observer-benefits-api:
    type: aws-lambda
    parameters:
      fileName: observer-benefits-api.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - observer-benefits-api-
    dependencies:
      - observer-benefits-api-cloudformation
