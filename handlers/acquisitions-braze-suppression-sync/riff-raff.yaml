# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/data/templates/handler/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  acquisitions-braze-suppression-sync-cloudformation:
    type: cloud-formation
    app: acquisitions-braze-suppression-sync
    parameters:
      templateStagePaths:
        CODE: acquisitions-braze-suppression-sync-CODE.template.json
        PROD: acquisitions-braze-suppression-sync-PROD.template.json
  acquisitions-braze-suppression-sync:
    type: aws-lambda
    parameters:
      fileName: acquisitions-braze-suppression-sync.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - acquisitions-braze-suppression-sync-
    dependencies:
      - acquisitions-braze-suppression-sync-cloudformation
