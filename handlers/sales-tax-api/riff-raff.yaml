# MANAGED FILE: to push changes see buildcheck/README.md - template: buildcheck/data/templates/handler/riff-raff.yaml.ts
stacks:
  - support
regions:
  - eu-west-1
allowedStages:
  - CODE
  - PROD
deployments:
  sales-tax-api-cloudformation:
    type: cloud-formation
    app: sales-tax-api
    parameters:
      templateStagePaths:
        CODE: sales-tax-api-CODE.template.json
        PROD: sales-tax-api-PROD.template.json
  sales-tax-api:
    type: aws-lambda
    parameters:
      fileName: sales-tax-api.zip
      bucketSsmLookup: true
      prefixStack: false
      functionNames:
        - sales-tax-api-
    dependencies:
      - sales-tax-api-cloudformation
